.cont-row{display:grid;grid-template-columns:1fr 80px 80px 90px 100px 160px;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--br);font-size:12px}
.cont-row:hover{background:var(--b2)}
.cont-h{font-weight:600;color:var(--mt);font-size:11px;text-transform:uppercase;background:var(--b2)}
</style>

// ===== UTILS =====
function eCanc(n){return !!(D.canc&&D.canc.find(function(c){return c.nome===n&&(c.ativo===true||String(c.ativo).toLowerCase()==="true");}));}
function todosObj(){
  var lista=[];
  AF.forEach(function(a){
    var m=D.mat.find(function(x){return x.nome===a.nome;});
    lista.push({
      nome:a.nome,
      numero:(m?m.numero:a.numero)||"",
      plano:m?m.plano:a.plano,
      valor:m?+m.valor:a.valor,
      diaVenc:m?+m.diaVenc:a.diaVenc,
      diasSem:m?m.diasSem:a.diasSem,
      horario:m?m.horario:a.horario,
      prof:m?m.prof:a.prof,
      fixo:true,
      dataMatricula:(m?(m.dataMatricula||m.data):a.dataMatricula)||"",
      desconto:(m?m.desconto:a.desconto)||0,
      promocao:(m?m.promocao:a.promocao)||"",
      vencimento:calcVencContrato((m?(m.dataMatricula||m.data):a.dataMatricula)||"",m?m.plano:a.plano)||""
    });
  });
  D.mat.forEach(function(m){
    if(!lista.find(function(a){return a.nome===m.nome;})){
      lista.push({
        nome:m.nome,numero:m.numero||"",plano:m.plano,valor:+m.valor,diaVenc:+m.diaVenc,
        diasSem:m.diasSem,horario:m.horario,prof:m.prof,fixo:false,
        dataMatricula:m.dataMatricula||m.data||"",
        desconto:m.desconto||0,promocao:m.promocao||"",
        vencimento:calcVencContrato(m.dataMatricula||m.data||"",m.plano)||""
      });
    }
  });
  return lista;
}
function ativos(){return todosObj().filter(function(a){return!eCanc(a.nome);});}
function cancelados(){return todosObj().filter(function(a){return eCanc(a.nome);});}
function getDados(nome){var m=D.mat.find(function(x){return x.nome===nome;});if(m)return m;return AF.find(function(a){return a.nome===nome;})||null;}
function BRL(v){return "R$ "+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(s){
  if(!s||s===""||s==="undefined"||s===null)return "—";
  var d;
  if(typeof s==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(s)){var p=s.split("-");d=new Date(+p[0],+p[1]-1,+p[2]);}
  else d=new Date(s);
  if(isNaN(d.getTime()))return "—";
  return d.toLocaleDateString("pt-BR");
}
function lq(b,f){return +((+b)-(TAXA[f]||0)).toFixed(2);}
function totP(){return D.pag.reduce(function(a,p){return{b:a.b+(+p.bruto||0),l:a.l+(+p.liquido||0)};},{b:0,l:0});}
function totD(){return D.desp.reduce(function(a,d){return a+(+d.valor||0);},0);}
function totA(){return D.aulas.reduce(function(a,x){return a+(+x.total||0);},0);}
function showLov(v){document.getElementById("lov").style.display=v?"flex":"none";}

async function saveCaixa(){var h=["nome","valor","plano","dataVenc","pago","dataPag","numDoc","formaPag","diasSem"];var rows=D.caixa.map(function(c){return h.map(function(k){var v=c[k];if(typeof v==="boolean")v=v?'true':'false';return String(v||"");});});await rewriteAba("caixa",h,rows);}

async function loadAba(aba){
  try{
    var r=await fetch(SURL+"?aba="+encodeURIComponent(aba),{mode:"cors",headers:{"Accept":"application/json"}});
    var rows=await r.json();
    if(!Array.isArray(rows)||rows.length<2)return[];
    var h=rows[0];
    return rows.slice(1).map(function(row){
      var obj={};
      h.forEach(function(k,i){
        var v=row[i];
        var vs=String(v||"").trim();
        var vl=vs.toLowerCase();
        if(vl==="true")obj[k]=true;
        else if(vl==="false")obj[k]=false;
        // Limpar datas ISO (ex: 2026-01-19T03:00:00.000Z → 2026-01-19)
        else if(/^\d{4}-\d{2}-\d{2}T/.test(vs))obj[k]=vs.substring(0,10);
        else if(v!==""&&v!==null&&v!==undefined&&vs!==""&&!isNaN(v))obj[k]=+v;
        else obj[k]=v||"";
      });
      return obj;
    });
  }catch(e){console.error("loadAba error:",aba,e);return null;}
}

function dataVencMes(diaVenc,ano,mes){
  // Constrói YYYY-MM-DD para o dia escolhido pelo aluno no mês/ano dados
  // Se o dia não existe no mês (ex: dia 31 em fevereiro), usa o último dia
  var ultimoDia=new Date(ano,mes,0).getDate();
  var dia=Math.min(+diaVenc,ultimoDia);
  return ano+"-"+String(mes).padStart(2,"0")+"-"+String(dia).padStart(2,"0");
}

function gerarCaixa(){
  var ano=MES_ANO.a,mes=MES_ANO.m;
  var pfxMes=ano+"-"+String(mes).padStart(2,"0");
  var vistos=new Set();
  var lista=[];
  ativos().forEach(function(a){
    if(vistos.has(a.nome))return;
    vistos.add(a.nome);
    var dv=dataVencMes(a.diaVenc,ano,mes);
    var pgList=D.pag.filter(function(p){return p.aluno===a.nome&&p.data&&p.data.startsWith(pfxMes);});
    var pago=pgList.length>0;
    var inf=pago?pgList[0]:null;
    lista.push({nome:a.nome,valor:a.valor,plano:a.plano,dataVenc:dv,pago:pago,dataPag:inf?inf.data:"",numDoc:"",formaPag:inf?inf.forma:"",diasSem:a.diasSem||""});
  });
  return lista;
}

function ensureCaixaMes(){
  var ano=MES_ANO.a,mes=MES_ANO.m,pfx=mesAtualPfx();
  // Remover do caixa qualquer entrada de aluno cancelado
  D.caixa=D.caixa.filter(function(c){return!eCanc(c.nome);});
  // Remover duplicatas (manter só 1 por nome/mês)
  var vistos=new Set();
  D.caixa=D.caixa.filter(function(c){
    if(!c.dataVenc)return true;
    var chave=c.nome+"|"+c.dataVenc.substring(0,7);
    if(vistos.has(chave))return false;
    vistos.add(chave);
    return true;
  });
  // Adicionar alunos ativos que ainda não têm entrada no mês
  ativos().forEach(function(a){
    var jaTem=D.caixa.find(function(c){return c.nome===a.nome&&c.dataVenc&&c.dataVenc.startsWith(pfx);});
    if(!jaTem){
      var dv=dataVencMes(a.diaVenc,ano,mes);
      var pfxMes=pfx;
      var pgList=D.pag.filter(function(p){return p.aluno===a.nome&&p.data&&p.data.startsWith(pfxMes);});
      var pago=pgList.length>0;
      var inf=pago?pgList[0]:null;
      D.caixa.push({nome:a.nome,valor:a.valor,plano:a.plano,dataVenc:dv,pago:pago,dataPag:inf?inf.data:"",numDoc:"",formaPag:inf?inf.forma:"",diasSem:a.diasSem||""});
    }
  });
}

async function syncAll(){
  showLov(true);
  var cats=["pag","mat","desp","aulas","exp","caixa","canc","feedbacks","agenda","historico"];
  var abas=["pagamentos","matriculas","despesas","aulas","experimentais","caixa","cancelados","feedbacks","agenda","historico"];
  var ok=true;
  for(var i=0;i<cats.length;i++){var rows=await loadAba(abas[i]);if(rows===null){ok=false;break;}if(rows.length>0)D[cats[i]]=rows;}
  if(!ok){syncOk=false;showLov(false);alert("Erro ao carregar dados do Google Sheets.");return;}
  // Criar registro de 1ª matrícula no histórico para quem ainda não tem
  if(!D.historico)D.historico=[];
  var hh=["nome","plano","valor","diaVenc","prof","dataMatricula","dataRenovacao","vencimento","evento","dataEvento"];
  var todosList=todosObj();
  for(var i=0;i<todosList.length;i++){
    var a=todosList[i];
    var jaTem=D.historico.find(function(h){return h.nome===a.nome&&h.evento==="matricula";});
    if(!jaTem&&a.dataMatricula){
      var hObj={nome:a.nome,plano:a.plano,valor:a.valor,diaVenc:a.diaVenc,prof:a.prof,
        dataMatricula:a.dataMatricula,dataRenovacao:"",
        vencimento:calcVencContrato(a.dataMatricula,a.plano)||"",
        evento:"matricula",dataEvento:a.dataMatricula};
      D.historico.push(hObj);
      await fetch(SURL,{method:"POST",mode:"no-cors",body:JSON.stringify({aba:"historico",headers:hh,row:hh.map(function(k){return String(hObj[k]||"");})})});
    }
  }
  if(D.caixa.length===0){D.caixa=gerarCaixa();}
  ensureCaixaMes();
  await saveCaixa();
  gerarAlertasContrato();
  syncOk=ok;showLov(false);
}

async function seed(){
  var ph=["aluno","data","tabela","desconto","bruto","liquido","forma","tipoOp","numDoc","banco"];
  for(var i=0;i<PI.length;i++){var p=PI[i];await push("pagamentos",ph,ph.map(function(h){return String(p[h]||"");}));}
  var dh=["descricao","valor","data","forma","tipo"];
  for(var i=0;i<DI.length;i++){var d=DI[i];await push("despesas",dh,dh.map(function(h){return String(d[h]||"");}));}
  var ch=["nome","valor","plano","dataVenc","pago","dataPag","numDoc","formaPag"];
  for(var i=0;i<D.caixa.length;i++){var c=D.caixa[i];await push("caixa",ch,ch.map(function(h){return String(c[h]||"");}));}
}

function caixaHtml(){
  try{
  if(!mesAtualCaixa){var _d=new Date();mesAtualCaixa=String(_d.getMonth()+1).padStart(2,"0")+"/"+_d.getFullYear();}
  var _ma=mesAtualCaixa.split("/"),_cm=+_ma[0],_ca=+_ma[1];
  var pfx=_ca+"-"+String(_cm).padStart(2,"0")+"-";
  var hoje=new Date().toISOString().split("T")[0];
  var caixaMes=D.caixa.filter(function(c){
    if(!c.dataVenc)return false;
    if(eCanc(c.nome))return false;
    if(c.dataVenc.startsWith(pfx))return true;
    if(c.dataVenc<pfx&&!isPago(c))return true;
    return false;
  });
  // Remover duplicatas por nome (manter só 1 por aluno neste mês)
  var nomesVisto=new Set();
  caixaMes=caixaMes.filter(function(c){
    if(nomesVisto.has(c.nome))return false;
    nomesVisto.add(c.nome);
    return true;
  });
  var pend=caixaMes.filter(function(c){return!isPago(c);}).sort(function(a,b){return a.dataVenc>b.dataVenc?1:-1;});

function calcDesc(base){
  var sel=document.getElementById("bds").value,wrap=document.getElementById("bdc"),vEl=document.getElementById("bv");
  if(sel==="c"){wrap.style.display="";var cv=parseFloat(document.getElementById("bdcv").value)||0;vEl.value=(base-cv).toFixed(2);}
  else{wrap.style.display="none";vEl.value=(base*(1-sel/100)).toFixed(2);}
  calcLiqB();
}
function calcLiqB(){
  var b=parseFloat(document.getElementById("bv").value)||0,f=document.getElementById("bf").value||"PIX",el=document.getElementById("bl");
  var liq=lq(b,f),taxa=b-liq;
  if(el)el.value=BRL(liq);
  var elTaxa=document.getElementById("tx-taxa"),elLiq=document.getElementById("tx-liquido");
  if(elTaxa)elTaxa.textContent="-"+BRL(taxa);
  if(elLiq)elLiq.textContent=BRL(liq);
}

async function excluirTodosPagamentos(){
  if(!confirm("Excluir TODOS os pagamentos?"))return;
  if(!confirm("Confirma? Esta ação não pode ser desfeita."))return;
  D.pag=[];
  // Zerar status pago no caixa
  D.caixa.forEach(function(c){c.pago=false;c.dataPag="";c.numDoc="";c.formaPag="";});
  await savePagamentos();
  await saveCaixa();

async function excluirPagamento(idx){
  var p=D.pag[idx];
  if(!p)return;
  if(!confirm("Excluir pagamento de "+p.aluno.split(" ")[0]+" ("+BRL(p.bruto)+" em "+fd(p.data)+")?"))return;
  // Reverter status no caixa
  var pfxMes=p.data?p.data.substring(0,7):"";
  var cx=D.caixa.find(function(c){return c.nome===p.aluno&&c.dataVenc&&c.dataVenc.startsWith(pfxMes);});
  if(cx&&isPago(cx)){
    // Checar se há outro pagamento no mesmo mês para este aluno
    var outrosPag=D.pag.filter(function(x,xi){return xi!==idx&&x.aluno===p.aluno&&x.data&&x.data.startsWith(pfxMes);});
    if(outrosPag.length===0){cx.pago=false;cx.dataPag="";cx.numDoc="";cx.formaPag="";}
  }
  D.pag.splice(idx,1);
  // Reescrever aba pagamentos inteira
  await savePagamentos();
  // Salvar caixa atualizado
  await saveCaixa();
  refreshContent();
}
function prefillAluno(){
  var nome=document.getElementById("pal").value,d=getDados(nome);
  if(d&&d.valor){document.getElementById("pt").value=d.valor;calcBruto();}
}
function calcBruto(){
  var t=parseFloat(document.getElementById("pt").value)||0;
  var dc=parseFloat(document.getElementById("pdc").value)||0;
  var dp=parseFloat(document.getElementById("pdp")?document.getElementById("pdp").value:0)||0;
  var base=t-dc;
  var b=base*(1-dp/100);
  document.getElementById("pb").value=b>0?b.toFixed(2):"";atualizaLiq();
}
function atualizaLiq(){
  var b=parseFloat(document.getElementById("pb").value)||0,f=document.getElementById("pf").value||"PIX",el=document.getElementById("pliq");
  if(el)el.value=lq(b,f).toLocaleString("pt-BR",{minimumFractionDigits:2});
}
async function savePag(){
  var aluno=document.getElementById("pal").value,data=document.getElementById("pd").value;
  var bruto=+document.getElementById("pb").value||0,forma=document.getElementById("pf").value;
  if(!data||!bruto){alert2("pa","Preencha data e valor.",false);return;}
  var liquido=lq(bruto,forma);
  var plano=document.getElementById("ppl").value;
  var pfxMes=data.substring(0,7);
  var tabela=+document.getElementById("pt").value||0;
  var desconto=+document.getElementById("pdc").value||0;
  var descPont=+document.getElementById("pdp").value||0;
  var obj={aluno:aluno,data:data,tabela:tabela,desconto:desconto,descontoPontualidade:descPont,bruto:bruto,liquido:liquido,forma:forma,plano:plano,banco:"SICREDI"};
  D.pag.push(obj);
  var cx=D.caixa.find(function(c){return c.nome===aluno&&c.dataVenc&&c.dataVenc.startsWith(pfxMes)&&!isPago(c);});
  if(cx){cx.pago=true;cx.dataPag=data;cx.formaPag=forma;}
  await savePagamentos();
  await saveCaixa();
  alert2("pa","Pagamento registrado! Caixa atualizado.",true);
  setTimeout(function(){refreshContent();},800);
}

function matHtml(){
  var dOpts=DIAS.map(function(d){return "<option>"+d+"</option>";}).join("");

async function salvarEdicaoHistorico(idx,nome){

async function salvarEdicaoMat(nome){
  var plano=document.getElementById("epl").value,valor=+document.getElementById("ev").value||0;
  var diaVenc=+document.getElementById("edv").value||1,diasSem=document.getElementById("eds").value;
  var horario=document.getElementById("eh").value,prof=document.getElementById("epr").value;
  var desconto=+document.getElementById("edes").value||0,promocao=document.getElementById("epro").value;
  var novaDataMat=document.getElementById("edm")?document.getElementById("edm").value:"";
  var novoNumero=document.getElementById("ednu")?document.getElementById("ednu").value:"";

  var af=AF.find(function(a){return a.nome===nome;});
  if(af){
    af.plano=plano;af.valor=valor;af.diaVenc=diaVenc;af.diasSem=diasSem;af.horario=horario;
    af.prof=prof;af.desconto=desconto;af.promocao=promocao;
    if(novaDataMat)af.dataMatricula=novaDataMat;
    if(novoNumero)af.numero=novoNumero;
  }

  var mat=D.mat.find(function(m){return m.nome===nome;});
  if(mat){
    mat.plano=plano;mat.valor=valor;mat.diaVenc=diaVenc;mat.diasSem=diasSem;mat.horario=horario;
    mat.prof=prof;mat.desconto=desconto;mat.promocao=promocao;
    if(novaDataMat){mat.dataMatricula=novaDataMat;mat.data=novaDataMat;}
    if(novoNumero)mat.numero=novoNumero;
  } else {
    var dataSalva=novaDataMat||(af?af.dataMatricula:"")||"";
    D.mat.push({nome:nome,numero:novoNumero||(af?af.numero:"")||"",data:dataSalva,plano:plano,valor:valor,
      diaVenc:diaVenc,diasSem:diasSem,horario:horario,prof:prof,canal:"",
      desconto:desconto,promocao:promocao,dataMatricula:dataSalva});
  }

  D.caixa=gerarCaixa();
  ensureCaixaMes();
  await saveMatriculas();
  await saveCaixa();
  closeModal();refreshContent();alert(nome.split(" ")[0]+" atualizado!");
}
async function salvarFeedback(nome){
  var data=document.getElementById("fbd").value,prof=document.getElementById("fbp").value,texto=document.getElementById("fbt").value.trim();
  if(!data||!texto){alert("Preencha data e feedback.");return;}
  var obj={aluno:nome,data:data,prof:prof,texto:texto};
  if(!D.feedbacks)D.feedbacks=[];
  D.feedbacks.push(obj);
  var h=["aluno","data","prof","texto"];
  await push("feedbacks",h,h.map(function(k){return obj[k]||"";}));
  closeModal();editarMatricula(nome);
}
function excluirFeedback(idx,nome){
  if(!confirm("Excluir este feedback?"))return;
  if(idx>=0&&idx<D.feedbacks.length)D.feedbacks.splice(idx,1);
  editarMatricula(nome);
}
async function saveMat(){
  var nome=document.getElementById("mn").value.trim().toUpperCase(),data=document.getElementById("md").value;
  var valor=+document.getElementById("mv").value||0,dv=+document.getElementById("mdv").value||1;
  var desconto=+document.getElementById("mdes").value||0,promocao=document.getElementById("mpro").value;
  var plano=document.getElementById("mpl").value;
  if(!nome||!data){alert2("ma","Preencha nome e data.",false);return;}
  if(!valor){alert2("ma","Preencha o valor.",false);return;}
  var obj={nome:nome,numero:document.getElementById("mnu").value,data:data,plano:plano,valor:valor,diaVenc:dv,diasSem:document.getElementById("mds").value,horario:document.getElementById("mh").value,prof:document.getElementById("mpr").value,canal:document.getElementById("mc2").value,desconto:desconto,promocao:promocao,dataMatricula:data};
  D.mat.push(obj);
  // Registrar 1ª matrícula no histórico
  if(!D.historico)D.historico=[];
  var hObj={nome:nome,plano:plano,valor:valor,diaVenc:dv,prof:obj.prof,dataMatricula:data,dataRenovacao:"",vencimento:calcVencContrato(data,plano)||"",evento:"matricula",dataEvento:data};
  D.historico.push(hObj);
  var hh=["nome","plano","valor","diaVenc","prof","dataMatricula","dataRenovacao","vencimento","evento","dataEvento"];
  await fetch(SURL,{method:"POST",mode:"no-cors",body:JSON.stringify({aba:"historico",headers:hh,row:hh.map(function(k){return String(hObj[k]||"");})})});
  D.caixa=gerarCaixa();
  ensureCaixaMes();
  await saveMatriculas();
  await saveCaixa();
  alert2("ma","Matrícula registrada! Adicionado ao caixa.",true);
  setTimeout(function(){refreshContent();},900);
}

// ===== CONTRATOS =====
function calcVencContrato(dataMatricula,plano){
  if(!dataMatricula||String(dataMatricula).trim()===""||plano==="Mensal")return null;
  var dm=String(dataMatricula).trim();
  var d;
  if(/^\d{4}-\d{2}-\d{2}$/.test(dm)){
    var p=dm.split("-");d=new Date(+p[0],+p[1]-1,+p[2]);
  } else if(/^\d{2}\/\d{2}\/\d{4}$/.test(dm)){
    var p=dm.split("/");d=new Date(+p[2],+p[1]-1,+p[0]);
  } else {return null;}
  if(isNaN(d.getTime()))return null;
  var dias=plano==="Trimestral"?90:plano==="Semestral"?180:plano==="Anual"?360:0;
  if(!dias)return null;
  d.setDate(d.getDate()+dias);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function statusContrato(venc,cancelado){
  if(cancelado)return{label:"Cancelado",cls:"br2"};
  if(!venc)return{label:"Em vigor",cls:"bg"};
  var hoje=new Date().toISOString().split("T")[0];
  if(venc<hoje)return{label:"Vencido",cls:"br2"};
  if(venc.slice(0,7)===hoje.slice(0,7))return{label:"Ir\u00e1 vencer",cls:"bam"};
  return{label:"Em vigor",cls:"bg"};
}
async function cancelarContrato(nome){
  var can=eCanc(nome);
  if(!can){if(!confirm("Cancelar contrato de "+nome.split(" ")[0]+"?"))return;}
  if(!D.canc)D.canc=[];
  var ei=D.canc.findIndex(function(c){return c.nome===nome;});
  var novoAtivo=!can;
  var obj={nome:nome,fixo:String(AF.some(function(a){return a.nome===nome;})),ativo:novoAtivo,data:new Date().toISOString().split("T")[0]};
  if(ei>=0)D.canc[ei]=obj;else D.canc.push(obj);
  
  // SE CANCELANDO: remover aulas fixas do aluno
  if(!novoAtivo){
    if(D.agenda){
      D.agenda=D.agenda.filter(function(a){
        // Mantém se: não é do aluno OU é avulso (não é fixo)
        return a.aluno!==nome || a.frequencia!=="fixo";
      });
    }
  }
  
  if(novoAtivo){
    D.caixa=D.caixa.filter(function(c){return c.nome!==nome||isPago(c);});
  }
  D.caixa=gerarCaixa();
  ensureCaixaMes();
  await saveCancelados();
  await saveCaixa();
  if(!novoAtivo) await saveAgenda(); // Salvar agenda se removeu aulas
  refreshContent();
}

function getWeekDates(offset){
  var d=new Date(),day=d.getDay(),monday=new Date(d);
  monday.setDate(d.getDate()-(day===0?6:day-1)+offset*7);
  var dates=[];
  for(var i=0;i<7;i++){var dd=new Date(monday);dd.setDate(monday.getDate()+i);dates.push(dd);}
  return dates;
}
function dateStr(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

async function saveAula(){
  var prof=document.getElementById("apr").value,data=document.getElementById("adt").value;
  if(!data){alert2("aa","Preencha a data.",false);return;}
  var desc,qtd,total;
  if(prof==="Amanda"){
    var tipo=document.getElementById("ata").value;
    if(tipo==="fixo"){desc="Sal\u00e1rio fixo";qtd=0;total=5000;}
    else{qtd=parseInt(document.getElementById("aqam").value)||0;desc="Aulas extras";total=qtd*45;}
  }else{
    var vl=parseFloat(document.getElementById("atn").value)||45;
    qtd=parseInt(document.getElementById("aqn").value)||0;
    desc=vl===45?"Aula fixa":"Aula experimental";total=vl*qtd;
  }
  var obj={prof:prof,descricao:desc,qtd:qtd,total:total,data:data};

function gerarCalendarioMes(mes,ano){
  var mesesNomes=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  var diasNomes=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
  
  var primeroDia=new Date(ano,mes,1);
  var ultimoDia=new Date(ano,mes+1,0);
  var diasDoMes=ultimoDia.getDate();
  var diaInicio=primeroDia.getDay();
  
  var html="<div>";
  html+="<div style='text-align:center;font-weight:600;margin-bottom:8px;font-size:12px'>"+mesesNomes[mes]+" "+ano+"</div>";
  html+="<div style='display:grid;grid-template-columns:repeat(7,1fr);gap:2px'>";
  
  // Headers dos dias
  for(var d=0;d<7;d++){
    html+="<div style='text-align:center;font-weight:600;font-size:10px;padding:4px;color:var(--mt)'>"+diasNomes[d].slice(0,1)+"</div>";
  }
  
  // Células vazias
  for(var v=0;v<diaInicio;v++){
    html+="<div style='height:28px'></div>";
  }
  
  // Dias do mês
  var hoje=new Date().toISOString().split("T")[0];
  for(var dia=1;dia<=diasDoMes;dia++){

function adicionarAulaAgenda(){
  var tipo=document.getElementById("ag-tipo").value;
  var nomeOriginal=tipo==="regular"?document.getElementById("ag-aluno").value:(document.getElementById("ag-exp-nome").value||"").trim();
  var reagendado=document.getElementById("ag-reagendado").value==="sim";
  var nomeExibir=reagendado?(nomeOriginal+" REAGENDADO"):nomeOriginal;
  var data=document.getElementById("ag-data").value;
  var hora=document.getElementById("ag-hora").value;
  var duracao=parseInt(document.getElementById("ag-duracao").value)||60;
  var prof=document.getElementById("ag-prof").value;
  var freq=document.getElementById("ag-freq").value;
  var alertEl=document.getElementById("ag-alert");
  if(!nomeOriginal||!data||!hora){
    alertEl.innerHTML="<div class='al2 ali'><i class='ti ti-alert-circle'></i> Preencha nome, data e hora</div>";
    return;
  }
  var cor=tipo==="experimental"?"#7CB342":(prof==="Amanda"?"#2E8FB3":"#5E35B1");
  var dataFim="";
  if(freq==="fixo"){
    var alunoData=D.mat.find(function(m){return m.nome===nomeOriginal;});
    if(!alunoData||!alunoData.dataMatricula){
      alertEl.innerHTML="<div class='al2 ali'><i class='ti ti-alert-circle'></i> Aluno sem data de matrícula. Verifique o cadastro.</div>";
      return;
    }
    // Para Mensal: gera aulas apenas por 1 mês. Para outros: calcula vencimento
    if(alunoData.plano==="Mensal"){
      var dataIni=new Date(data);
      dataFim=new Date(dataIni.getFullYear(),dataIni.getMonth()+1,dataIni.getDate());
      dataFim=dataFim.toISOString().split("T")[0];
    } else {
      dataFim=calcVencContrato(alunoData.dataMatricula,alunoData.plano);
    }
  }
  if(!D.agenda)D.agenda=[];
  if(freq==="fixo"){
    var cur=new Date(data+"T12:00");
    var fim=new Date(dataFim+"T12:00");
    var geradas=0;
    while(cur<=fim){
      D.agenda.push({aluno:nomeExibir,data:cur.toISOString().split("T")[0],hora:hora,duracao:duracao,professora:prof,tipo:tipo,frequencia:"fixo",dataFim:dataFim,status:"ativo",notas:"",cor:cor,presenca:""});
      cur.setDate(cur.getDate()+7);
      geradas++;
    }
    alertEl.innerHTML="<div class='al2 als'><i class='ti ti-check'></i> "+geradas+" aulas criadas até "+fd(dataFim)+"</div>";
  } else {
    D.agenda.push({aluno:nomeExibir,data:data,hora:hora,duracao:duracao,professora:prof,tipo:tipo,frequencia:"avulso",dataFim:"",status:"ativo",notas:"",cor:cor,presenca:""});
    alertEl.innerHTML="<div class='al2 als'><i class='ti ti-check'></i> Aula adicionada!</div>";
  }
  saveAgenda().then(function(){
    limparFormAgenda();
    renderAgendaView(agendaView,null);
    setTimeout(function(){alertEl.innerHTML="";},3000);
  });
}

async function saveAgenda(){
  var h=["aluno","data","hora","duracao","professora","tipo","frequencia","dataFim","status","notas","cor","presenca"];
  var rows=(D.agenda||[]).map(function(a){return h.map(function(k){return String(a[k]||"");});});
  await rewriteAba("agenda",h,rows);
}

function marcarPresenca(idx,tipo){
  if(!D.agenda[idx])return;
  var aula=D.agenda[idx];
  
  if(tipo==="falta"){
    abrirModalFalta(idx);

    aula.presenca="presenca";

  var modal=document.createElement("div");
  modal.className="modal";
  modal.onclick=function(e){e.stopPropagation();};
  
  modal.innerHTML="<h3 style='margin-bottom:16px;display:flex;align-items:center;gap:8px'><i class='ti ti-calendar-event' style='color:#D32F2F;font-size:20px'></i> Reagendar Aula</h3>";
  modal.innerHTML+="<div style='background:#FFEBEE;border-left:4px solid #D32F2F;padding:12px;border-radius:4px;margin-bottom:16px'><p style='color:#D32F2F;font-weight:600;margin:0;font-size:13px'>Aula original: <strong>"+aula.data.split('-').reverse().join('/')+" às "+aula.hora+"</strong></p><p style='color:#D32F2F;margin:4px 0 0;font-size:12px'>Esta aula será marcada como REAGENDADA (em vermelho)</p></div>";
  modal.innerHTML+="<div class='fi' style='margin-bottom:16px'><label>Nova data para a aula</label><input type='date' id='modal-reagenda-data' value='"+aula.data+"' style='font-size:13px;padding:10px;border:1px solid var(--br);border-radius:8px;width:100%;background:var(--b2);color:var(--tx)'></div>";
  modal.innerHTML+="<div class='fi' style='margin-bottom:20px'><label>Hora</label><input type='time' id='modal-reagenda-hora' value='"+aula.hora+"' style='font-size:13px;padding:10px;border:1px solid var(--br);border-radius:8px;width:100%;background:var(--b2);color:var(--tx)'></div>";
  modal.innerHTML+="<div style='display:flex;gap:10px'><button class='btn bp' onclick='confirmarReagendamento("+idx+");document.querySelector(\".modal-overlay\").remove()' style='flex:1'><i class='ti ti-check'></i> Reagendar</button><button class='btn' onclick='this.closest(\".modal-overlay\").remove()' style='flex:1'>Cancelar</button></div>";
  
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function confirmarReagendamento(idx){
  var aula=D.agenda[idx];
  var novaData=document.getElementById("modal-reagenda-data").value;
  var novaHora=document.getElementById("modal-reagenda-hora").value;
  
  aula.presenca="falta";
  aula.cor="#D32F2F";
  aula.notas="[REAGENDADO] "+aula.notas;
  
  if(!D.agenda)D.agenda=[];
  D.agenda.push({
    aluno:aula.aluno+" REAGENDADO",
    data:novaData,
    hora:novaHora,
    duracao:aula.duracao,
    professora:aula.professora,
    tipo:aula.tipo,
    frequencia:aula.frequencia,
    dataFim:aula.dataFim,
    status:"ativo",
    notas:"Aula reagendada de "+aula.data,
    cor:"#FFA726",
    presenca:""
  });
  
  saveAgenda().then(function(){renderAgendaView(agendaView,null);});
}

// === EXCLUIR ===
function excluirAula(idx){
  if(!confirm("Excluir esta aula? Isso é permanente."))return;
  D.agenda.splice(idx,1);
  saveAgenda().then(function(){closeModal();renderAgendaView(agendaView,null);});
}

function excluirTodas(){
  if(!confirm("Excluir TODAS as aulas? Isso é permanente e não pode ser desfeito."))return;
  D.agenda=(D.agenda||[]).filter(function(a){return a.tipo==="alerta_contrato";});
  saveAgenda().then(function(){renderAgendaView("lista",null);});
}

// === LISTA ===
function renderAgendaLista(){
  var aulas=(D.agenda||[]).filter(function(a){return a.tipo!=="alerta_contrato";}).sort(function(a,b){return a.data.localeCompare(b.data)||a.hora.localeCompare(b.hora);});
  var alertas=(D.agenda||[]).filter(function(a){return a.tipo==="alerta_contrato";}).sort(function(a,b){return a.data.localeCompare(b.data);});
  var html="<div style='margin-bottom:12px'><button class='btn bd' onclick='excluirTodas()'><i class='ti ti-trash'></i> Excluir Tudo</button></div>";
  html+="<div style='overflow-x:auto'><table><thead><tr><th>Aluno</th><th>Data</th><th>Hora</th><th>Professora</th><th>Presença</th><th>Ações</th></tr></thead><tbody>";
  if(alertas.length>0){
    alertas.forEach(function(a){html+="<tr><td colspan='6' style='background:#FFA726;color:#fff;padding:8px;font-weight:600;text-align:center'>📌 "+a.aluno+" — Contrato vence em "+fd(a.data)+"</td></tr>";});
  }
  aulas.forEach(function(a,i){
    var agendaIdx=(D.agenda||[]).indexOf(a);
    var corReal=a.presenca==="falta"?"#D32F2F":a.cor;
    var presLabel=a.presenca==="presenca"?"✓":a.presenca==="falta"?"✗":"—";
    html+="<tr>";
    html+="<td><span style='display:inline-block;width:8px;height:8px;background:"+corReal+";border-radius:2px;margin-right:6px'></span>"+a.aluno+"</td>";
    html+="<td>"+fd(a.data)+"</td>";
    html+="<td>"+a.hora+"</td>";
    html+="<td>"+a.professora+"</td>";
    html+="<td style='color:"+(a.presenca==="falta"?"#D32F2F":a.presenca==="presenca"?"#2E8FB3":"var(--mt)")+"'>"+presLabel+"</td>";
    html+="<td style='display:flex;gap:4px'>";
    html+="<button class='btn bsm' style='background:#2E8FB3;color:#fff;border:none' onclick='marcarPresenca("+agendaIdx+",\"presenca\")'>✓</button>";
    html+="<button class='btn bsm' style='background:#D32F2F;color:#fff;border:none' onclick='marcarPresenca("+agendaIdx+",\"falta\")'>✗</button>";
    html+="<button class='btn bd bsm' onclick='excluirAula("+agendaIdx+")'><i class='ti ti-trash'></i></button>";
    html+="</td></tr>";
  });
  html+="</tbody></table></div>";
  return html;
}

// === ALERTAS DE CONTRATO ===
function gerarAlertasContrato(){
  if(!D.agenda)D.agenda=[];
  D.agenda=D.agenda.filter(function(a){return a.tipo!=="alerta_contrato";});
  D.mat.forEach(function(m){
    if(m.dataMatricula&&m.plano&&m.plano!=="Mensal"){
      var venc=calcVencContrato(m.dataMatricula,m.plano);
      D.agenda.push({aluno:m.nome,data:venc,hora:"00:00",duracao:0,professora:"Sistema",tipo:"alerta_contrato",frequencia:"avulso",dataFim:"",status:"ativo",notas:"Contrato vence",cor:"#FFA726",presenca:""});
    }
  });
  saveAgenda();
}

  var todasAulasDoMes=(D.agenda||[]).filter(function(a){

  html+="</div>";
  html+="<div style='text-align:center;padding:12px'>";
  html+="<div style='font-size:11px;color:var(--mt);font-weight:600;margin-bottom:6px'>PRESENÇAS</div>";

  html+="</div>";

  html+="<div style='font-size:11px;color:var(--mt);font-weight:600;margin-bottom:6px'>FALTAS</div>";
  html+="<div style='font-size:24px;font-weight:700;color:#D32F2F'>"+faltasMes+"</div>";
  html+="</div>";
  html+="<div style='text-align:center;padding:12px'>";
  html+="<div style='font-size:11px;color:var(--mt);font-weight:600;margin-bottom:6px'>PENDENTE</div>";
  html+="<div style='font-size:24px;font-weight:700;color:#FF9800'>"+pendenteMes+"</div>";
  html+="</div>";
  html+="</div>";
  html+="<div style='text-align:center'>";

  html+="<div class='pw' style='margin-top:8px;height:6px'>";

  html+="</div>";

  html+="</div>";
  html+="</div>";
  
  // COLUNA 2: PONTOS DE ATENÇÃO

function atualizarDashboardPresenca(){
  var alunoSelecionado=document.getElementById("pres-aluno").value;
  var mesAtualPfx=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");
  
  var html="";
  
  if(alunoSelecionado){
    // Procura aulas do aluno (com ou sem "REAGENDADO" no final)
    var aulasDoAluno=(D.agenda||[]).filter(function(a){
      var nomeBase=a.aluno.replace(" REAGENDADO","");
      return nomeBase===alunoSelecionado && a.data.startsWith(mesAtualPfx) && a.tipo!=="alerta_contrato";
    });
    
    var totalAulas=aulasDoAluno.length;
    var presenças=aulasDoAluno.filter(function(a){return a.presenca==="presenca";}).length;
    var faltas=aulasDoAluno.filter(function(a){return a.presenca==="falta";}).length;
    var reagendados=aulasDoAluno.filter(function(a){return a.aluno.includes("REAGENDADO");}).length;
    var percentualPresença=totalAulas>0?Math.round((presenças/totalAulas)*100):0;
    
    // KPIs
    html+="<div class='kg' style='grid-template-columns:repeat(2,1fr);margin-bottom:20px'>";
    html+="<div class='kpi'><div class='kl'>Total de Aulas</div><div class='kv'>"+totalAulas+"</div></div>";
    html+="<div class='kpi'><div class='kl'>Presenças</div><div class='kv' style='color:#2E8FB3'>"+presenças+"</div></div>";
    html+="<div class='kpi'><div class='kl'>Faltas</div><div class='kv' style='color:#D32F2F'>"+faltas+"</div></div>";
    html+="<div class='kpi'><div class='kl'>Reagendamentos</div><div class='kv' style='color:#FFA726'>"+reagendados+"</div></div>";
    html+="</div>";
    
    // Alerta se presença <= 75%
    if(percentualPresença<=75 && totalAulas>0){
      html+="<div class='card' style='border-left:4px solid #D32F2F;background:#FFEBEE;padding:12px;margin-bottom:16px'>";
      html+="<p style='color:#D32F2F;font-weight:600;margin:0'><i class='ti ti-alert'></i> Presença baixa!</p>";
      html+="<p style='color:#D32F2F;font-size:13px;margin:8px 0 0'>Apenas "+percentualPresença+"% de presença. Aluno precisa de atenção.</p>";
      html+="</div>";
    }
    
    // Gráfico de percentual
    html+="<div class='card'>";
    html+="<div style='text-align:center'>";
    html+="<div style='font-size:24px;font-weight:700;color:#2E8FB3'>"+percentualPresença+"%</div>";
    html+="<div style='font-size:12px;color:var(--mt);margin-top:4px'>Presença este mês</div>";
    html+="<div class='pw' style='margin-top:12px'>";
    html+="<div class='pb' style='width:"+percentualPresença+"%;background:"+( percentualPresença>=75?"#4CAF50":"#D32F2F")+"'></div>";
    html+="</div>";
    html+="<div style='font-size:11px;color:var(--mt);margin-top:8px'>"+presenças+" presentes de "+totalAulas+" aulas</div>";
    html+="</div></div>";
    
    // Lista de aulas
    html+="<div class='card'>";
    html+="<div class='ct'><i class='ti ti-list'></i> Aulas deste mês</div>";
    html+="<div style='overflow-x:auto'><table>";
    html+="<thead><tr><th>Data</th><th>Hora</th><th>Professora</th><th>Status</th></tr></thead><tbody>";
    
    aulasDoAluno.sort(function(a,b){return a.data.localeCompare(b.data);}).forEach(function(a){
      var statusBg="#f0f0f0",statusTxt="—",statusLabel="Pendente";
      if(a.presenca==="presenca"){statusBg="#E8F5E9";statusTxt="#4CAF50";statusLabel="✓ Presença";}
      else if(a.presenca==="falta"){statusBg="#FFEBEE";statusTxt="#D32F2F";statusLabel="✗ Falta";}
      
      var nomeExibicao=a.aluno.includes("REAGENDADO")?" [REAGENDADO]":"";
      
      html+="<tr>";
      html+="<td>"+a.data.split("-").reverse().join("/")+""+nomeExibicao+"</td>";
      html+="<td>"+a.hora+"</td>";
      html+="<td>"+a.professora+"</td>";
      html+="<td style='background:"+statusBg+";color:"+statusTxt+";font-weight:600;text-align:center'>"+statusLabel+"</td>";
      html+="</tr>";
    });
    
    html+="</tbody></table></div></div>";
  } else {
    html+="<div class='card'>";
    html+="<p style='color:var(--mt);text-align:center;padding:40px'>👆 Selecione um aluno para ver o dashboard</p>";
    html+="</div>";
  }
  
  document.getElementById("pres-dashboard").innerHTML=html;
}

render();
